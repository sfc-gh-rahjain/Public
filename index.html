<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cummins Supply Chain Control Tower</title>
    <!-- Core Engine -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Recharts Dependencies -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-transition { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        .chat-bubble-user { background-color: #f3f4f6; border-bottom-right-radius: 2px; }
        .chat-bubble-ai { background-color: #DA291C; color: white; border-bottom-left-radius: 2px; }

        /* Custom Tooltip Styling */
        .kpi-tooltip {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s, visibility 0.2s;
        }
        .group:hover .kpi-tooltip {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-[#FDFDFD]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, Fragment, useEffect, useRef } = React;

        // --- CONSTANTS ---
        const CUMMINS_RED = '#DA291C';
        const CUMMINS_BLACK = '#000000';
        const SUCCESS = '#10B981';
        const WARNING = '#F59E0B';
        const DANGER = '#EF4444';

        const apiKey = ""; 

        // --- CUSTOM SVG ICON ENGINE ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                TrendingUp: <path d="m22 7-8.5 8.5-5-5L2 17M22 7h-6M22 7v6"/>,
                AlertTriangle: <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3ZM12 9v4M12 17h.01"/>,
                Package: <path d="M16.5 9.4 7.5 4.21M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16ZM3.27 6.96l8.73 5.05 8.73-5.05M12 22.08V12"/>,
                Truck: <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2M15 18H9M19 18h2a1 1 0 0 0 1-1v-5h-4l-3-5h-3M16 13h6M7 18a2 2 0 1 0 0-4 2 2 0 0 0 0 4ZM18 18a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>,
                ShieldCheck: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10ZM9 12l2 2 4-4"/>,
                Leaf: <Fragment><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></Fragment>,
                HeartHandshake: <Fragment><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M12 5 9.04 7.96a2.17 2.17 0 0 0 0 3.08v0c.85.85 2.23.85 3.08 0L15 8.12"/></Fragment>,
                Cpu: <Fragment><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9zM9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 15h3M1 9h3M1 15h3"/></Fragment>,
                Activity: <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>,
                Globe: <Fragment><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20M12 2a14.5 14.5 0 0 1 0 20M2 12h20"/></Fragment>,
                Zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/>,
                Timer: <path d="M10 2h4M12 14l3-3M12 22a8 8 0 1 0 0-16 8 8 0 0 0 0 16z"/>,
                MapPin: <Fragment><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></Fragment>,
                Factory: <Fragment><path d="M2 20V10l5 2V10l5 2V10l10 4v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2z"/><path d="M17 18h1"/><path d="M12 18h1"/><path d="M7 18h1"/></Fragment>,
                Shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
                Briefcase: <Fragment><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></Fragment>,
                Search: <Fragment><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></Fragment>,
                Share2: <Fragment><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.59 13.51 6.82 3.98M15.41 6.51l-6.82 3.98"/></Fragment>,
                MessageSquare: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
                Send: <Fragment><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2l-11 11"/></Fragment>,
                X: <path d="M18 6 6 18M6 6l12 12"/>,
                Bot: <Fragment><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4M8 16v.01M16 16v.01"/></Fragment>,
                Target: <Fragment><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Fragment>,
                Layers: <path d="M12 2 2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />,
                Info: <Fragment><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- MOCK DATA ---
        const ALL_DATA = {
            fulfillmentTrend: [
                { week: 'W1', forecast: 4200, actual: 4050, fillRate: 92, csat: 4.2 },
                { week: 'W2', forecast: 4500, actual: 4620, fillRate: 94, csat: 4.4 },
                { week: 'W3', forecast: 4400, actual: 4100, fillRate: 93, csat: 4.3 },
                { week: 'W4', forecast: 4800, actual: 4950, fillRate: 97, csat: 4.7 },
                { week: 'W5', forecast: 4600, actual: 4300, fillRate: 98, csat: 4.9 },
            ],
            inflationData: [
                { category: 'Castings', current: 14 },
                { category: 'Electronics', current: 8 },
                { category: 'Steel', current: 22 },
                { category: 'Logistics', current: 11 },
            ],
            riskRadarData: [
                { subject: 'Multi-Tier Vis', A: 130, B: 110 },
                { subject: 'Lead Time Var', A: 98, B: 130 },
                { subject: 'Sourcing Redundancy', A: 86, B: 130 },
                { subject: 'Asset Precision', A: 140, B: 100 },
                { subject: 'Negotiation ROI', A: 115, B: 90 },
            ],
            plantStandardization: [
                { plant: 'Kothrud', energy: 98, waste: 95, compliance: 100 },
                { plant: 'Phaltan', energy: 92, waste: 88, compliance: 100 },
                { plant: 'Jamshedpur', energy: 85, waste: 92, compliance: 98 },
                { plant: 'Pithampur', energy: 89, waste: 84, compliance: 100 },
            ],
            aiAccuracyData: [
                { name: 'W1', ml: 78, trad: 65 },
                { name: 'W2', ml: 82, trad: 64 },
                { name: 'W3', ml: 81, trad: 66 },
                { name: 'W4', ml: 85, trad: 63 },
            ],
            esgData: [
                { name: 'Scope 1', value: 400, color: CUMMINS_BLACK },
                { name: 'Scope 2', value: 300, color: CUMMINS_RED },
                { name: 'Scope 3', value: 300, color: '#666666' },
            ],
            kpis: {
                caseFillRate: "98.2%",
                outOfStock: "5.8%",
                perfectOrder: "94.5%",
                forecastGain: "+10.2%",
                supplierOTD: "96.8%",
                rcaResolution: "2.4 Hrs",
                energyReduction: "-12.4%",
                retailerVisibility: "92.4%",
                collabEfficiency: "96.8%",
                governanceSOT: "100%"
            },
            suppliers: [
                { name: 'Forging Node A', score: 82, status: 'Stable' },
                { name: 'Electronics Group', score: 45, status: 'Critical' },
                { name: 'Casting Unit 4', score: 68, status: 'At-Risk' },
                { name: 'Alloy Supply Inc', score: 91, status: 'Optimal' },
            ]
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('financial');
            const [isReady, setIsReady] = useState(false);
            const [chatOpen, setChatOpen] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'ai', text: "Hello! I am your Supply Chain Agent. I have access to all global KPI data. How can I assist you today?" }
            ]);
            const [userInput, setUserInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                const check = setInterval(() => { 
                    if (window.Recharts && window.Recharts.BarChart) { 
                        setIsReady(true); 
                        clearInterval(check); 
                    } 
                }, 100);
                return () => clearInterval(check);
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            if (!isReady) {
                return (
                    <div className="h-screen flex items-center justify-center bg-white">
                        <div className="text-center">
                            <div className="w-12 h-12 border-4 border-[#DA291C] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Syncing Intelligence Engine...</p>
                        </div>
                    </div>
                );
            }

            const { 
                BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, 
                AreaChart, Area, Cell, PieChart, Pie, RadarChart, PolarGrid, PolarAngleAxis, Radar, ComposedChart 
            } = window.Recharts;

            // --- DOWNLOAD LOGIC ---
            const handleDownloadReport = () => {
                const timestamp = new Date().toLocaleString();
                const reportContent = `
CUMMINS SUPPLY CHAIN CONTROL TOWER REPORT
Generated: ${timestamp}
--------------------------------------------------

EXECUTIVE SUMMARY:
- Case Fill Rate: ${ALL_DATA.kpis.caseFillRate}
- Perfect Order Rate: ${ALL_DATA.kpis.perfectOrder}
- Out-of-Stock: ${ALL_DATA.kpis.outOfStock}
- Forecast Gain: ${ALL_DATA.kpis.forecastGain}

OPERATIONAL KPI DETAILS:
- Supplier On-Time Delivery: ${ALL_DATA.kpis.supplierOTD}
- RCA Resolution Time: ${ALL_DATA.kpis.rcaResolution}
- Energy Reduction (Mission Zero): ${ALL_DATA.kpis.energyReduction}
- Retailer Visibility: ${ALL_DATA.kpis.retailerVisibility}

CRITICAL SUPPLIER RISK SCORES:
${ALL_DATA.suppliers.map(s => `- ${s.name}: ${s.score} (${s.status})`).join('\n')}

RECENT TREND DATA (Actual vs Forecast):
${ALL_DATA.fulfillmentTrend.map(t => `- ${t.week}: Actual ${t.actual}, Forecast ${t.forecast}`).join('\n')}

--------------------------------------------------
END OF REPORT - Cummins Global Intelligence Node
                `.trim();

                const blob = new Blob([reportContent], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `Cummins_SC_Report_${new Date().toISOString().split('T')[0]}.txt`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const handleSend = async () => {
                if (!userInput.trim()) return;
                const userText = userInput;
                setMessages(prev => [...prev, { role: 'user', text: userText }]);
                setUserInput("");
                setIsTyping(true);

                try {
                    const systemPrompt = `You are the Cummins Supply Chain Agent. Context Data: ${JSON.stringify(ALL_DATA)}. Instructions: Provide factual answers based only on data. Explain reasoning. Professional tone. Concise.`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userText }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "I'm having trouble connecting to the data stream.";
                    setMessages(prev => [...prev, { role: 'ai', text: aiResponse }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'ai', text: "Error connecting to AI engine." }]);
                } finally {
                    setIsTyping(false);
                }
            };

            const TabButton = ({ id, label, icon }) => (
                <button 
                    onClick={() => setActiveTab(id)}
                    className={`flex items-center gap-2 px-6 py-4 text-[10px] font-black uppercase tracking-widest border-b-4 tab-transition ${activeTab === id ? 'border-red-600 text-black bg-gray-50' : 'border-transparent text-gray-400 hover:text-black'}`}
                >
                    <Icon name={icon} size={16} />
                    {label}
                </button>
            );

            // Tooltip Component
            const KPITooltip = ({ text }) => (
                <div className="relative group ml-1.5 cursor-help">
                    <Icon name="Info" size={10} className="text-slate-300 hover:text-red-600 transition-colors" />
                    <div className="kpi-tooltip absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-48 p-2 bg-slate-900 text-white text-[10px] font-medium leading-tight rounded-md shadow-2xl z-50 pointer-events-none text-center">
                        {text}
                        <div className="absolute top-full left-1/2 -translate-x-1/2 border-8 border-transparent border-t-slate-900"></div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen text-slate-900 pb-10">
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-50 px-6 py-3 flex justify-between items-center">
                        <div className="flex items-center gap-4">
                            <div>
                                <h1 className="text-2xl font-black tracking-tighter uppercase leading-none text-black">Cummins</h1>
                                <p className="text-[10px] font-bold text-red-600 tracking-[0.2em] uppercase">Supply Chain Control Tower</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <button className="bg-black text-white px-5 py-2.5 rounded text-xs font-black flex items-center gap-2 uppercase tracking-widest shadow-lg hover:bg-red-600 transition-colors">
                                <Icon name="Globe" size={14} /> Global View
                            </button>
                        </div>
                    </header>

                    <div className="bg-white border-b border-gray-100 shadow-sm overflow-x-auto no-scrollbar">
                        <div className="max-w-[1600px] mx-auto px-6 flex">
                            <TabButton id="financial" label="Financial & Operations" icon="Package" />
                            <TabButton id="resilience" label="Resilience & Risk" icon="ShieldCheck" />
                            <TabButton id="sustainability" label="Sustainability" icon="Leaf" />
                            <TabButton id="customer" label="Customer Centricity" icon="HeartHandshake" />
                            <TabButton id="modern" label="2026 AI & Predictive" icon="Cpu" />
                        </div>
                    </div>

                    <main className="max-w-[1600px] mx-auto px-6 mt-8 animate-fade">
                        {/* TAB 1: FINANCIAL */}
                        {activeTab === 'financial' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    {[
                                        { label: 'Case Fill Rate', val: ALL_DATA.kpis.caseFillRate, status: SUCCESS, desc: 'Percentage of orders filled completely on the first shipment.' },
                                        { label: 'Out-of-Stock', val: ALL_DATA.kpis.outOfStock, status: SUCCESS, desc: 'Percentage of requested items unavailable in inventory.' },
                                        { label: 'Perfect Order', val: ALL_DATA.kpis.perfectOrder, status: WARNING, desc: 'Orders delivered on-time, in-full, and error-free.' },
                                        { label: 'Forecast Gain', val: ALL_DATA.kpis.forecastGain, status: SUCCESS, desc: 'Efficiency improvements from AI demand prediction.' }
                                    ].map((kpi, i) => (
                                        <div key={i} className="bg-white p-5 border-l-4 shadow-sm" style={{ borderLeftColor: kpi.status }}>
                                            <div className="flex items-center">
                                                <p className="text-[9px] font-black text-gray-400 uppercase tracking-widest">{kpi.label}</p>
                                                <KPITooltip text={kpi.desc} />
                                            </div>
                                            <p className="text-2xl font-black mt-1 text-black">{kpi.val}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="grid grid-cols-12 gap-6">
                                    <div className="col-span-12 lg:col-span-8 bg-white p-6 rounded border border-gray-100 shadow-sm">
                                        <h3 className="text-sm font-black uppercase tracking-tighter text-black mb-8">Supply-Demand Matching</h3>
                                        <div className="h-80">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <ComposedChart data={ALL_DATA.fulfillmentTrend}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f0f0f0" />
                                                    <XAxis dataKey="week" axisLine={false} tickLine={false} tick={{ fontSize: 10, fontWeight: 700 }} />
                                                    <YAxis axisLine={false} tickLine={false} />
                                                    <Tooltip />
                                                    <Bar dataKey="actual" fill={CUMMINS_BLACK} radius={[2, 2, 0, 0]} />
                                                    <Line type="monotone" dataKey="forecast" stroke={CUMMINS_RED} strokeWidth={4} dot={{ r: 4, fill: CUMMINS_RED }} />
                                                </ComposedChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                    <div className="col-span-12 lg:col-span-4 bg-white p-6 rounded border border-gray-100 shadow-sm">
                                        <h3 className="text-sm font-black uppercase tracking-tighter mb-6 text-black">Inflation Impacts</h3>
                                        <div className="space-y-6">
                                            {ALL_DATA.inflationData.map((row, idx) => (
                                                <div key={idx}>
                                                    <div className="flex justify-between items-center mb-1">
                                                        <span className="text-xs font-black uppercase text-slate-700">{row.category}</span>
                                                        <span className="text-xs font-black text-red-600">+{row.current}%</span>
                                                    </div>
                                                    <div className="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                                                        <div className="bg-red-600 h-full" style={{ width: `${(row.current/30)*100}%` }}></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 2: RESILIENCE */}
                        {activeTab === 'resilience' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <div className="bg-white p-5 border-l-4 border-l-emerald-500 shadow-sm">
                                        <div className="flex items-center">
                                            <p className="text-[9px] font-black text-gray-400 uppercase tracking-widest">Supplier OTD</p>
                                            <KPITooltip text="Percentage of shipments from suppliers that arrive on the scheduled date." />
                                        </div>
                                        <p className="text-2xl font-black mt-1 text-black">{ALL_DATA.kpis.supplierOTD}</p>
                                    </div>
                                    <div className="bg-white p-5 border-l-4 border-l-emerald-500 shadow-sm">
                                        <div className="flex items-center">
                                            <p className="text-[9px] font-black text-gray-400 uppercase tracking-widest">RCA Resolution</p>
                                            <KPITooltip text="Average time taken to solve the root cause of supply disruptions." />
                                        </div>
                                        <p className="text-2xl font-black mt-1 text-black">{ALL_DATA.kpis.rcaResolution}</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-12 gap-6">
                                    <div className="col-span-12 lg:col-span-7 bg-white p-8 rounded border border-gray-100 shadow-sm">
                                        <h3 className="text-sm font-black uppercase tracking-tighter text-black mb-8">Maturity Radar</h3>
                                        <div className="h-80">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <RadarChart cx="50%" cy="50%" outerRadius="80%" data={ALL_DATA.riskRadarData}>
                                                    <PolarGrid stroke="#f0f0f0" />
                                                    <PolarAngleAxis dataKey="subject" tick={{ fontSize: 10, fontWeight: 700 }} />
                                                    <Radar name="Cummins" dataKey="A" stroke={CUMMINS_RED} fill={CUMMINS_RED} fillOpacity={0.4} />
                                                    <Radar name="Baseline" dataKey="B" stroke={CUMMINS_BLACK} fill={CUMMINS_BLACK} fillOpacity={0.1} />
                                                </RadarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                    <div className="col-span-12 lg:col-span-5 bg-black text-white p-6 rounded shadow-xl">
                                        <h4 className="text-[10px] font-black uppercase tracking-widest text-red-600 mb-6">AI Supplier Risk Scores</h4>
                                        <div className="space-y-4">
                                            {ALL_DATA.suppliers.map((node, idx) => (
                                                <div key={idx} className="flex items-center justify-between p-3 border border-white/10 bg-white/5 rounded">
                                                    <span className="text-xs font-black uppercase text-white">{node.name}</span>
                                                    <span className={`text-sm font-black ${node.score < 50 ? 'text-red-500' : 'text-emerald-500'}`}>{node.score}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 3: SUSTAINABILITY */}
                        {activeTab === 'sustainability' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="bg-white p-5 border-l-4 border-l-emerald-500 shadow-sm">
                                        <div className="flex items-center">
                                            <p className="text-[9px] font-black text-gray-400 uppercase tracking-widest">Energy per Unit</p>
                                            <KPITooltip text="Total energy consumed per engine unit produced. Part of Mission Zero." />
                                        </div>
                                        <p className="text-2xl font-black mt-1 text-black">{ALL_DATA.kpis.energyReduction}</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-12 gap-6">
                                    <div className="col-span-12 lg:col-span-4 bg-white p-8 rounded border border-gray-100 shadow-sm text-center">
                                        <div className="flex justify-center mb-4"><Icon name="Leaf" className="text-emerald-500" size={40} /></div>
                                        <h3 className="text-xl font-black uppercase tracking-tighter text-black">Emissions Profile</h3>
                                        <div className="h-64 mt-4">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie data={ALL_DATA.esgData} innerRadius={60} outerRadius={80} paddingAngle={5} dataKey="value">
                                                        {ALL_DATA.esgData.map((entry, index) => <Cell key={index} fill={entry.color} />)}
                                                    </Pie>
                                                    <Tooltip />
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                    <div className="col-span-12 lg:col-span-8 bg-white p-6 rounded border border-gray-100 shadow-sm">
                                        <h3 className="text-sm font-black uppercase tracking-tighter text-black mb-8">Site Standardization</h3>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead><tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100"><th className="pb-4">Site</th><th className="pb-4 text-center">Energy</th><th className="pb-4 text-center">Waste</th><th className="pb-4 text-right">Compliance</th></tr></thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {ALL_DATA.plantStandardization.map((site, idx) => (
                                                        <tr key={idx}>
                                                            <td className="py-4 font-bold text-sm text-slate-700">{site.plant}</td>
                                                            <td className="py-4 text-center text-xs font-bold">{site.energy}%</td>
                                                            <td className="py-4 text-center text-xs font-bold">{site.waste}%</td>
                                                            <td className="py-4 text-right"><span className="px-2 py-0.5 rounded text-[9px] font-black bg-emerald-100 text-emerald-700 uppercase">{site.compliance}%</span></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 4: CUSTOMER */}
                        {activeTab === 'customer' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-white p-5 border-l-4 border-l-red-600 shadow-sm">
                                        <div className="flex items-center">
                                            <p className="text-[9px] font-black text-gray-400 uppercase tracking-widest">Retailer Visibility</p>
                                            <KPITooltip text="Real-time data transparency with distribution partners." />
                                        </div>
                                        <p className="text-2xl font-black mt-1 text-black">{ALL_DATA.kpis.retailerVisibility}</p>
                                    </div>
                                    <div className="bg-white p-5 border-l-4 border-l-red-600 shadow-sm">
                                        <div className="flex items-center">
                                            <p className="text-[9px] font-black text-gray-400 uppercase tracking-widest">Collab Efficiency</p>
                                            <KPITooltip text="Productivity rating of collaborative demand planning sessions." />
                                        </div>
                                        <p className="text-2xl font-black mt-1 text-black">{ALL_DATA.kpis.collabEfficiency}</p>
                                    </div>
                                    <div className="bg-white p-5 border-l-4 border-l-red-600 shadow-sm">
                                        <div className="flex items-center">
                                            <p className="text-[9px] font-black text-gray-400 uppercase tracking-widest">Governance Sync</p>
                                            <KPITooltip text="Alignment of global policies across regional supply nodes." />
                                        </div>
                                        <p className="text-2xl font-black mt-1 text-black">{ALL_DATA.kpis.governanceSOT}</p>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded border border-gray-100 shadow-sm">
                                    <h3 className="text-sm font-black uppercase tracking-tighter text-black mb-8">CSAT vs Service Level</h3>
                                    <div className="h-80">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <ComposedChart data={ALL_DATA.fulfillmentTrend}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f0f0f0" />
                                                <XAxis dataKey="week" axisLine={false} tickLine={false} tick={{ fontSize: 10, fontWeight: 700 }} />
                                                <YAxis yAxisId="l" axisLine={false} tickLine={false} domain={[90, 100]} />
                                                <YAxis yAxisId="r" orientation="right" axisLine={false} tickLine={false} domain={[0, 5]} />
                                                <Tooltip />
                                                <Bar yAxisId="l" dataKey="fillRate" fill={CUMMINS_BLACK} radius={[2, 2, 0, 0]} />
                                                <Line yAxisId="r" type="monotone" dataKey="csat" stroke={CUMMINS_RED} strokeWidth={4} dot={{ r: 6, fill: CUMMINS_RED, strokeWidth: 2, stroke: '#fff' }} />
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 5: MODERN AI */}
                        {activeTab === 'modern' && (
                            <div className="space-y-6">
                                <div className="bg-slate-900 p-8 rounded shadow-2xl flex flex-col lg:flex-row items-center gap-12 text-white relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-12 opacity-5"><Icon name="Cpu" size={140} /></div>
                                    <div className="relative z-10 flex-1">
                                        <h2 className="text-3xl font-black uppercase tracking-tighter mb-4 italic underline decoration-red-600 decoration-4 underline-offset-8">Predictive Core 2026</h2>
                                        <p className="text-sm text-slate-400 font-medium leading-relaxed mb-8">AI-driven auto-selection algorithms optimizing global signals with 14-day production early warnings.</p>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-white/5 border border-white/10 p-4 rounded text-center"><p className="text-2xl font-black">85.4%</p><p className="text-[8px] font-black text-red-600 uppercase">ML Accuracy</p></div>
                                            <div className="bg-white/5 border border-white/10 p-4 rounded text-center"><p className="text-2xl font-black">4ms</p><p className="text-[8px] font-black text-red-600 uppercase">Mesh Latency</p></div>
                                        </div>
                                    </div>
                                    <div className="relative z-10 flex-1 w-full bg-white/5 p-6 rounded border border-white/10">
                                        <h4 className="text-[10px] font-black uppercase text-white mb-6 underline decoration-red-600 underline-offset-4 tracking-[0.2em]">Accuracy Gain vs Traditional</h4>
                                        <div className="h-64">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <AreaChart data={ALL_DATA.aiAccuracyData}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#333" />
                                                    <XAxis dataKey="name" stroke="#666" fontSize={10} axisLine={false} />
                                                    <YAxis stroke="#666" fontSize={10} domain={[40, 100]} axisLine={false} />
                                                    <Tooltip />
                                                    <Area type="monotone" dataKey="ml" stroke={CUMMINS_RED} fill={CUMMINS_RED} fillOpacity={0.2} strokeWidth={3} name="AI Prediction" />
                                                    <Area type="monotone" dataKey="trad" stroke="#666" fill="transparent" strokeWidth={2} strokeDasharray="5 5" name="Traditional Stat" />
                                                </AreaChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-6 rounded border border-gray-100 border-t-4 border-t-red-600 shadow-sm text-center">
                                        <div className="flex items-center justify-center mb-2">
                                            <Icon name="Target" className="text-red-600"/>
                                            <KPITooltip text="Precision improvement in forecasting vs manual baselines." />
                                        </div>
                                        <p className="text-2xl font-black uppercase">+10.2% Accuracy</p>
                                    </div>
                                    <div className="bg-white p-6 rounded border border-gray-100 border-t-4 border-t-black shadow-sm text-center">
                                        <div className="flex items-center justify-center mb-2">
                                            <Icon name="Layers" className="text-red-600"/>
                                            <KPITooltip text="Level of synchronization across global supply nodes." />
                                        </div>
                                        <p className="text-2xl font-black uppercase">94% Core Sync</p>
                                    </div>
                                    <div className="bg-white p-6 rounded border border-gray-100 border-t-4 border-t-black shadow-sm text-center">
                                        <div className="flex items-center justify-center mb-2">
                                            <Icon name="Activity" className="text-red-600"/>
                                            <KPITooltip text="Percentage of live IoT assets feeding data to the Tower." />
                                        </div>
                                        <p className="text-2xl font-black uppercase">75.2% Live Telemetry</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Agentic Bot UI */}
                    <div className="fixed bottom-6 right-6 z-[100]">
                        {!chatOpen ? (
                            <button onClick={() => setChatOpen(true)} className="bg-red-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-transform group">
                                <Icon name="MessageSquare" size={24} />
                                <span className="absolute -top-1 -right-1 flex h-4 w-4">
                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                    <span className="relative inline-flex rounded-full h-4 w-4 bg-red-500 border-2 border-white"></span>
                                </span>
                            </button>
                        ) : (
                            <div className="bg-white w-[380px] h-[550px] rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 animate-fade">
                                <div className="bg-black p-4 flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 bg-red-600 rounded flex items-center justify-center"><Icon name="Bot" size={18} className="text-white" /></div>
                                        <div><p className="text-[10px] font-black text-red-600 leading-none">CUMMINS AI</p><p className="text-xs font-bold text-white uppercase">Strategic Supply Agent</p></div>
                                    </div>
                                    <button onClick={() => setChatOpen(false)} className="text-white/50 hover:text-white"><Icon name="X" size={18} /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar bg-slate-50">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] px-4 py-3 rounded-2xl text-sm ${m.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai shadow-md'}`}>
                                                <p className="leading-relaxed font-medium">{m.text}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {isTyping && <div className="flex justify-start"><div className="bg-white border px-4 py-2 rounded-2xl shadow-sm"><div className="flex gap-1"><span className="w-1.5 h-1.5 bg-red-600 rounded-full animate-bounce"></span><span className="w-1.5 h-1.5 bg-red-600 rounded-full animate-bounce [animation-delay:0.2s]"></span><span className="w-1.5 h-1.5 bg-red-600 rounded-full animate-bounce [animation-delay:0.4s]"></span></div></div></div>}
                                    <div ref={chatEndRef} />
                                </div>
                                <div className="p-4 bg-white border-t">
                                    <div className="flex items-center gap-2 bg-slate-100 rounded-xl px-3 py-1 border border-slate-200 focus-within:border-red-600">
                                        <input type="text" placeholder="Ask about KPI reasoning..." className="bg-transparent border-none focus:ring-0 text-sm flex-1 py-2 outline-none" value={userInput} onChange={(e) => setUserInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSend()}/>
                                        <button onClick={handleSend} disabled={!userInput.trim() || isTyping} className="text-red-600 disabled:text-slate-300 transition-transform"><Icon name="Send" size={20} /></button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <footer className="max-w-[1600px] mx-auto px-6 mt-12 pt-8 border-t border-gray-200 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="flex items-center gap-3">
                            <div className="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
                            <p className="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Cummins Global Supply Chain</p>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={handleDownloadReport} className="px-4 py-2 border border-black text-[10px] font-black uppercase rounded hover:bg-black hover:text-white transition-all tracking-widest">Download Full Report</button>
                            <button className="px-4 py-2 bg-red-600 text-white text-[10px] font-black uppercase rounded hover:bg-black transition-all tracking-widest">Enterprise Audit</button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
